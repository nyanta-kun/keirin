name: CI/CD

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip -q
          # VPS互換セット: scikit-learn バージョン緩和・Selenium/Jupyter/可視化系を除外
          sed 's/scikit-learn==1.4.1/scikit-learn>=1.4.0/' requirements.txt \
            | grep -v -E '^(selenium|webdriver-manager|jupyter|matplotlib|seaborn|xgboost|ipykernel)' \
            | pip install -r /dev/stdin -q
          pip install psycopg2-binary -q

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" << 'SSHEOF'
          set -e
          cd ~/keirin
          git stash || true
          git pull origin master
          .venv/bin/pip install -r requirements_vps_slim.txt -q
          echo "[deploy] $(date '+%Y-%m-%d %H:%M:%S') OK"
          SSHEOF
